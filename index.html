<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/x-icon" href="./res/img/icon.gif">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./res/css/style.css">
    <title>Leap&Run</title>
</head>
<body>
    <audio loop id="music" src="" type="audio/mpeg"></audio>
    <audio id="sfx" type="audio/mpeg"></audio>
    <audio id="sfx_land" type="audio/mpeg"></audio>
    <audio id="sfx_miss" type="audio/mpeg"></audio>
    <audio id="sfx_dead" type="audio/mpeg"></audio>
    <audio id="sfx_player" type="audio/mpeg"></audio>
    <audio id="sfx_walk" type="audio/mpeg"></audio>
    <audio id="sfx_climb" type="audio/mpeg"></audio>
    <audio id="sfx_jump" type="audio/mpeg"></audio>
    <audio id="sfx_punch" type="audio/mpeg"></audio>
    <audio id="sfx_extra_jump" type="audio/mpeg"></audio>
    <audio id="sfx_boss_talk" type="audio/mpeg"></audio>
    <audio id="sfx_boss_laugh" type="audio/mpeg"></audio>
    <!--
        https://uppbeat.io/ - orb jump
        https://pixabay.com/
        Eccentric Sounds - i will kill you
    -->
    <div id="container">
        <div id="startMenu">
            <img id="text" src="./res/img/name.png" alt="name" draggable="false">
            <div id="startMenuBtns">
                <div id="playButton">Play!</div>
                <div id="tutorialButton">Tutorial</div>
            </div>
        </div>
        <div id="esc">
            <div id="button_resume">Resume [esc]</div>
            <div id="button_retry">Retry</div>
            <div id="button_back">Back to Lobby</div>
            <div id="button_menu">Back to Menu</div>
        </div>
        <div id="characters">
            <div id="images">
                <div>
                    <p>Rioter</p>
                    <img id="man" src="./res/img/man.png" alt="man" draggable="false">
                </div>
                <div>
                    <p>Ruby</p>
                    <img id="woman" src="./res/img/woman.png" alt="woman" draggable="false">
                </div>
            </div>
            <div id="choose">Choose your Character!</div>
        </div>
        <img id="paper" src="./res/gif/paper.gif" alt="paper" draggable="false">
        <div id="music_editor">
            <div id="music_volume">
                <div>
                    <img id="note_logo" src="./res/img/note.png" alt="note">
                    <p id="whichAudio">Music</p>
                </div>
                <p id="music_value">50%</p>
                <img id="not_invert_arrow1" src="./res/img/arrow.png" alt="arrow">
                <img id="invert_arrow1" src="./res/img/arrow.png" alt="arrow">
            </div>
            <div id="sfx_volume">
                <div>
                    <img id="sfx_logo" src="./res/img/sfx.png" alt="sfx">
                    <p id="whichAudio">SFX</p>
                </div>
                <p id="sfx_value">50%</p>
                <img id="not_invert_arrow2" src="./res/img/arrow.png" alt="arrow">
                <img id="invert_arrow2" src="./res/img/arrow.png" alt="arrow">
            </div>
            <p id="music_editor_back">Resume [esc]</p>
        </div>
        <div id="game">
            <div id="myHp">
                <img id="heart1" src="./res/img/heart.png" alt="heart">
                <img id="heart2" src="./res/img/heart.png" alt="heart">
                <img id="heart3" src="./res/img/heart.png" alt="heart">
            </div>
            <div id="hps">
                <div id="hp_bar">
                    <div id="name">BOSS</div>
                    <div id="hp"></div>
                </div>
            </div>
            <div id="canvas_container">
                <img id="rising" src="./res/gif/rising.gif" alt="rising">
                <img id="background" src="./res/img/wall.png" alt="wall">
                <canvas id="canvas" width="1024" height="576"></canvas>
                <img id="black" src="./res/img/black.png" alt="black">
                <video id="transition1">
                    <source src="./res/vid/transition1.webm" type="video/webm">
                </video>
                <video id="transition2">
                    <source src="./res/vid/transition2.webm" type="video/webm">
                </video>
                <video id="scene">
                    <source src="./res/vid/rioter_scene.mp4" type="video/mp4">
                </video>
            </div>
            <div id="escape_button">
                <div id="first_col"></div>
                <div id="second_col"></div>
            </div>
            <div id="note_button">
            <img id="note" src="./res/img/note.png" alt="note">
            </div>
        </div>
        <img id="fullBlack" src="./res/img/black.png" alt="black" draggable="false">
    </div>
    <script src="./res/js/draw.js"></script>
    <script src="./res/js/maps.js"></script>
    <script src="./res/js/script.js"></script>
</body>
</html>
