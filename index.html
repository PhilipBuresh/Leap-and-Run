<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./res/css/style.css">
    <title>Leap&Run</title>
</head>
<body>
    <audio loop id="music" src="" type="audio/mpeg"></audio>
    <div id="container">
        <div id="startMenu">
            <div id="text">Leap&Run</div>
            <div id="wasd">Play with: WASD and Space</div>
            <div id="playButton">Play!</div>
        </div>
        <div id="esc">
            <div id="button_resume">Resume [esc]</div>
            <div id="button_retry">Retry</div>
            <div id="button_back">Back to Lobby</div>
            <div id="button_menu">Back to Menu</div>
        </div>
        <div id="game">
            <div id="hps">
                <div id="hp_bar">
                    <div id="name">BOSS</div>
                    <div id="hp"></div>
                </div>
                <div id="myHp">
                    <img id="heart1" src="./res/img/heart.png" alt="heart">
                    <img id="heart2" src="./res/img/heart.png" alt="heart">
                    <img id="heart3" src="./res/img/heart.png" alt="heart">
                </div>
            </div>
            <div id="canvas_container">
                <img id="rising" src="./res/gif/rising.gif" alt="rising">
                <img id="background" src="./res/img/wall.png" alt="wall">
                <canvas id="cnv" width="1024" height="576"></canvas>
                <img id="black" src="./res/img/black.png" alt="black">
            </div>
            <div id="buttons">
                <div id="left_buttons">
                    <div id="button_enter" ontouchstart = "enterFunction()"><p>Enter</p></div>
                    <div id="button_up" ontouchstart = "go_up()" ontouchend = "isJumping = false;"><img src="./res/img/arrow.png" alt="arrow"></div>
                    <div id="button_punch" ontouchstart = "go_punch()" ontouchend = "alreadyPunched = false;"><img src="./res/img/punch.png" alt="punch"></div>
                    <div id="button_down" ontouchstart = "go_down();" ontouchend = "go_down_return()"><img src="./res/img/arrow.png" alt="arrow"></div>
                </div>
                <div id="right_buttons">
                    <div id="button_left" ontouchstart = "go_left()" ontouchend = "isMovingLeft = false;"><img src="./res/img/arrow.png" alt="arrow"></div>
                    <div id="button_right" ontouchstart = "go_right()" ontouchend = "isMovingRight = false;"><img src="./res/img/arrow.png" alt="arrow"></div>
                </div>
            </div>
            <img id="youWin" src="./res/gif/youwin.gif" alt="win">
            <div id="escape_button">
                <div id="first_col"></div>
                <div id="second_col"></div>
            </div>
        </div> 
    </div>
    <script src="./res/js/script.js"></script>
</body>
</html>
