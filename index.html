<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./res/css/style.css">
    <title>Leap&Run</title>
</head>
<body>
    <div id="container">
        <div id="text">Leap&Run</div>
        <div id="wasd">Play with: WASD and Space</div>
        <img id="background" src="./res/img/wall.png" alt="wall">
        <canvas id="cnv" width="1024" height="576" ></canvas>
        <div id="buttons">
            <div id="left_buttons">
                <div id="button_up" onmousedown = "go_up()" onmouseup = "isJumping = false;"><img src="./res/img/arrow.png" alt="arrow"></div>
                <div id="button_punch" onmousedown = "go_punch()" onmouseup = "alreadyPunched = false;"><img src="./res/img/punch.png" alt="punch"></div>
                <div id="button_down" onmousedown = "go_down()" onmouseup = "go_down_return()"><img src="./res/img/arrow.png" alt="arrow"></div>
            </div>
            <div id="right_buttons">
                <div id="button_left" onmousedown = "go_left()" onmouseup = "isMovingLeft = false"><img src="./res/img/arrow.png" alt="arrow"></div>
                <div id="button_right" onmousedown = "go_right()" onmouseup = "isMovingRight = false;"><img src="./res/img/arrow.png" alt="arrow"></div>
            </div>
        </div>
    </div>
    <script src="./res/js/script.js"></script>
</body>
</html>
